<!DOCTYPE html>

  <style type="text/css">
    /* 调整表格宽度和样式 */
    table {
      width: 75%;
      /* 表格宽度为页面的80% */
      text-align: center;
      /* 内容居中 */
      background-color: antiquewhite;
      /* 表格背景色 */
    }

    body {
      background-color: antiquewhite;

    }

    /* 设置表格中图片的宽度 */
    td img {
      width: 400px;
      /* 图片宽度为400像素 */
    }

    /* 设置表格中链接的样式 */
    a {
      font-size: 38px;
      /* 链接文字大小 */
      text-decoration: none;
      /* 去除下划线 */
      color: #e79a26;
      /* 链接文字颜色 */
    }

    /* 定义图片放大动画效果 */
    @keyframes myframe {
      from {
        transform: scale(1.0, 1.0);
        /* 初始大小 */
      }

      to {
        transform: scale(1.1, 1.1);
        /* 放大到1.1倍 */
      }
    }

    /* 鼠标悬停图片时触发动画 */
    img:hover {
      animation: myframe 0.5s forwards;
      /* 动画持续0.5秒,保持最终状态 */
    }
  </style>
</head>

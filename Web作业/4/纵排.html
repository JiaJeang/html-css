<!DOCTYPE html>
<html lang="en">
<head>

    <title>纵排导航栏</title>
</head>
<style>
    /* * {
        padding:0;
        margin: 0;
    } */
ul {
    list-style: none;
}

li {
    width: 180px;
    background-color: #3f3f3f;
    padding-left: 20px;
}

a {
    display: block;
    height: 40px;
    line-height: 40px;
    color:#ffffff;
    text-decoration: none;
    font-size: 18px;
}
li:hover{
    background-color: #e9bc29;;
    color: #ffffff;
}
a:hover {
    background-color: #e9bc29;
    color: #ffffff;
}
</style>
<body>

        </ul>

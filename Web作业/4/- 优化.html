    <style>
        * {
            margin: 0;
            padding: 0;

        body {
            background-color: antiquewhite;

        a {
            color: #000000;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
            padding: 0 30px;
            height: 40px;
            line-height: 40px;
        }

        table {
            background-color: antiquewhite;
            margin: 0 auto;
            text-align: center;
            font-size: 28px;
            border-spacing: 20px;
            /* 单元格间距 */
        }

        table img {
            width: 100%;
            /* 图片宽度占满单元格 */
            max-width: 400px;
            /* 最大宽度限制 */
            height: auto;
            /* 高度自动适应 */
        }

        caption {
            font-size: 24px;
            height: 50px;
            line-height: 50px;
            width: 250px;
            background-color: chocolate;
            margin: 50px auto 50px;
        }

        .top {
            text-align: center;
            margin: 40px auto;
        }

        .top a {
            margin: 0 20px;
        }

        .top a:hover {
            color: #000;

        }

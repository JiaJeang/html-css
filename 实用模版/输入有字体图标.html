<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .input-wrap {
        position: relative;
        /* 父容器相对定位 */
    }

    .input-wrap input {
        padding-left: 30px;
        /* 给图标留空间 */
    }

    .input-wrap i {
        position: absolute;
        /* 图标绝对定位 */
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        /* 垂直居中 */
        color: #999;
    }
</style>

<body>
    <div class="input-wrap">
        <i class="fas fa-user"></i> <!-- 字体图标 -->
        <input type="text" placeholder="123">
    </div>


</body>

</html>

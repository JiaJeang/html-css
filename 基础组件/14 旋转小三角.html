<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div {
        position: relative;
        width: 250px;
        height: 30px;
        border: 1px solid #000;
    }

    input {
        width: 200px;
        height: 28px;
        outline: none;
        border: none;
        padding-left: 10px;
    }

    div::after {
        content: '';
        position: absolute;
        bottom: 10px;
        right: 12px;
        width: 13px;
        height: 13px;
        border-bottom: 1px solid #000;
        border-left: 1px solid #000;
        /* background-color: pink; */
        transform: rotate(-45deg);
        transition: all .3s;
    }

    div:hover::after {
        transform-origin: center center;
        transform: rotate(135deg);
    }
</style>

<body>
    <div>
        <input type="text" placeholder="&nbsp;&nbsp;请输入">
    </div>

</body>

</html>

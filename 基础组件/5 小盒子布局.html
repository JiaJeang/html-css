<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    a {
        text-decoration: none;
        color: #000000;
        font-size: 14px;
    }

    a:hover {
        color: #666;
        text-decoration: underline;
    }

    li {
        list-style: none;
        /* 去掉列表项的默认样式 */
    }

    .box {
        width: 258px;
        height: 158px;
        border: 1px solid #000000;
        margin: 100px auto;
    }

    .ti {
        font-size: 18px;
        font-weight: 400;
        height: 38px;
        line-height: 38px;
        border-bottom: 1px dotted #000000;
        /* 没有设置weight(宽度)padding不会改变盒子本身大小 */
        padding-left: 21px;

    }

    .box ul li {
        height: 21px;
        line-height: 21px;
    }

    .box ul {
        padding-left: 10px;
        padding-top: 10px;
    }
</style>

<body>
    <div class="box">
        <h3 class="ti">品优购快报</h3>
        <ul>
            <li>
                <a href="#" target="_blank">
                    【特惠】耳机...
                </a>
            </li>
            <li>
                <a href="#" target="_blank">
                    【特惠】手机...
                </a>
            </li>
            <li>
                <a href="#" target="_blank">
                    【特惠】电脑...
                </a>
            </li>
            <li>
                <a href="#" target="_blank">
                    【特惠】平板...
                </a>
            </li>
            <li>
                <a href="#" target="_blank">
                    【特惠】智能...
                </a>
            </li>
        </ul>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
    }

    body {
        background-color: #f5f5f5;
    }

    .box {
        width: 298px;
        height: 415px;
        background-color: #ffffff;
        margin: 100px auto;
    }

    .box img {
        width: 100%;
        height: 55%;
        /* 图片宽度设置为和盒子宽度一致 */
    }

    .review {
        height: 70px;
        font-size: 14px;
        padding: 0 28px;
        /* 没有设置weight(宽度)padding不会改变盒子本身大小 */
        margin-top: 30px;
    }

    .appraise {
        font-size: 12px;
        color: #b0b0b0;
        margin-top: 20px;
        padding: 0 28px;
    }

    .info {
        font-size: 14px;
        padding: 0 28px;
        margin-top: 10px;
        text-decoration: none;

    }

    .info h4 {
        display: inline-block;
        font-weight: 400;
    }

    .info span {
        color: #ff6700;
    }
</style>

<body>
    <div class="box">
        <img src="https://cdn.cnbj0.fds.api.mi-img.com/b2c-shopapi-pms/pms_1740638541.0557913.png" alt="" id="erji">
        <p class="review">小米首发双功放三单元｜55dB 深度降噪｜哈曼联合调音</p>
        <div class="appraise">来自:小米</div>
        <div class="info">
            <h4>Redmi AirDots真无线蓝...</h4>
            <span>|199元</span>
        </div>
    </div>

</body>

</html>

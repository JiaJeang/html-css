<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        margin: 100px auto;
        width: 50px;
        height: 50px;
        background-color: #f3f5f7;
        border-radius: 15px;
        overflow: hidden;
    }

    .img {
        width: 104px;
        height: 50px;
        /* margin-left: -54px; */
        transition: all 0.2s ;
    }

    .img img {
        width: 50px;
        height: 50px;
    }

    .box:hover .img {
        margin-left: -54px;
    }
</style>


<body>
    <div class="box">
        <div class="img">
            <img src="./images/arr.png" alt="">
            <img src="./images/暂停.png" alt="">
        </div>

    </div>

</body>

</html>

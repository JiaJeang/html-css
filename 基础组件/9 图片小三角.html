<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        margin: 100px auto;
        position: relative;
        width: 200px;
        height: 200px;
        background-color: #f3f5f7;

    }

    .li {
        position: absolute;
        top: -20px;
        right: 0px;
        width: 0;
        height: 0;
        border: 10px solid transparent;
        border-bottom-color: red;
    }
</style>


<body>
    <div class="box">
        <div class="li"></div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侧边链接</title>
</head>

<style>
    a {
        display: block;
        height: 50px;
        width: 300px;
        text-decoration: none;
        color: #fff;
        background-color: #55585a;
        font-size: 18px;
        line-height: 50px;
        /* 设置行高实现垂直居中 */
        text-indent: 2em;
        /* 文字缩进-本身不够精确 用padding更好 */
    }

    a:hover {
        /* text-decoration: underline; */
        background-color: #ff6700;
    }
</style>

<body>
    <a href="#" target="_blank">手机 电话卡</a>
    <a href="#" target="_blank">电视 盒子</a>
    <a href="#" target="_blank">笔记本 平板</a>
    <a href="#" target="_blank">出行 穿戴</a>
    <a href="#" target="_blank">智能 路由器</a>
    <a href="#" target="_blank">健康 儿童</a>
    <a href="#" target="_blank">耳机 音响</a>
</body>

</html>

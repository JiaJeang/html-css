<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .price {
        margin: 100px auto;
        width: 180px;
        height: 25px;
        border: 1px solid red;
        text-align: center;
        line-height: 25px;
    }

    .price .miaosha {
        position: relative;
        float: left;
        width: 120px;
        height: 100%;
        background-color: red;
        color: #fff;
        font-size: 24px;
        font-weight: 700;

    }

    /* 垂直三角 */
    .miaosha i {
        position: absolute;
        top: 0;
        right: 0;
        width: 0;
        height: 0;
        border-color: transparent #fff transparent transparent;
        border-style: solid;
        border-width: 25px 12px 0 0;
    }
</style>

<body>
    <div class="price">
        <span class="miaosha">$1888
            <!-- 垂直三角 -->
            <i class="sanjiao"></i>
        </span>
        <span style="font-size: 14px;color: gray;"><del>$3888</del></span>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        position: relative;
        margin: 100px auto;
        width: 400px;
        height: 330px;
        background-color: #f3f3f3;
    }

    .box .img img {
        width: 100%;
    }

    .hidden {
        position: absolute;
        top: 0;
        left: 0;
        /* display:block; */
        display: none;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, .4) url(images/arr.png) no-repeat center;
    }

    .box .text {
        margin-top: 10px;
        margin-left: 20px;
    }

    .box:hover .hidden {
        display: block
    }
</style>

<body>
    <div class="box">
        <div class="hidden"></div>
        <div class="img">
            <img src="images/5&6.jpg" alt="">
        </div>
        <div class="text">
            中秋快乐
        </div>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页面</title>
</head>
</body>
<h1>
    青春不常在,抓紧谈恋爱
</h1>
<table wideh="800" cellspacing="18" border="0">
    <form action="https://www.luogu.com.cn/" method="get">
        <tr>
            <td>性别</td>
            <td><input type="radio" name="gender" checked="checked" id="man">
                <label for="man">男</label>
                <input type="radio" name="gender" id="woman">
                <label for="woman">女</label>
            </td>
        </tr>
        <tr>
            <td>生日</td>
            <td>
                <select>
                    <option selscted="selscted">--请选择年</option>
                    <option>2025</option>
                    <option>2024</option>
                    <option>2023</option>
                </select>
                <select>
                    <option selscted="selscted">--请选择月</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
                <select>
                    <option selscted="selscted">--请选择日</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><label for="area">所在地区</label></td>
            <td>
                <input type="text" value="请输入省份" size="10" maxlength="8" id="area">
            </td>
        </tr>
        <tr>
            <td>婚姻状况</td>
            <td>
                <input type="radio" name="1" checked="checked" id="1">
                <label for="1">未婚</label>
                <input type="radio" name="1" id="3">
                <label for="3">离异</label>
            </td>
        </tr>
        <tr>
            <td><label for="xueli">学历</label></td>
            <td>
                <input type="text" value="" size="10" maxlength="8" id=xueli>
            </td>
        </tr>
        <tr>
            <td>喜欢的类型</td>
            <td>
                <input type="checkbox" name="lake" value="1" id="1">
                <label for="1">妩媚的</label>
                <input type="checkbox" name="lake" value="1" id="2">
                <label for="2">可爱的</label>
                <input type="checkbox" name="lake" value="1" id="3">
                <label for="3">小鲜肉</label>
                <input type="checkbox" name="lake" value="1" id="4">
                <label for="4">老腊肉</label>
                <input type="checkbox" name="lake" value="1" id="5" checked="checked">
                <label for="5">都喜欢</label>
            </td>
        </tr>
        <tr>
            <td><label for="jieshao">自我介绍</label></td>
            <td>
                <textarea name="remark" cols="30" rows="5" id="jieshao">自我介绍</textarea>
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <input type="reset" value="重新填写">
                <input type="submit" value="免费注册">
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <input type="checkbox" checked="checked" id="xieyi">
                <label for="xieyi">我已阅读并同意<a href="#" style="text-decoration: none; color: red;">
                        <用户注册协议>
                    </a></label>
            </td>
        </tr>
    </form>
    <tr>
        <td></td>
        <td>
            <a href="https://www.luogu.com.cn/"><ins>我是会员,立即登录</ins></a>
        </td>
    </tr>
    <!-- <tr>
        <td></td>
    </tr> -->
    <tr>
        <td></td>
        <td>
            <h2>我承诺</h2>
            <ul>
                <li>年满18岁</li>
                <li>包着玩笑的态度</li>
                <li>真诚寻找玩伴</li>
            </ul>
        </td>
    </tr>
</table>

</html>

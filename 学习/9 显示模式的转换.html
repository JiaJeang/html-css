<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显示模式的转换</title>

    <link rel="stylesheet" href="link.css">
    <style>
        a {
            font-size: 30px;
            background-color: pink;
            width: 200px;
            height: 40px;
            /* 行内元素转换为块级元素 */
            display: block;
        }

        div {
            font-size: 30px;
            background-color: pink;
            width: 200px;
            height: 400px;
            /* 块级元素转换为行内元素 */
            display: inline;
            /* 行内元素不能设置宽高 */
        }

        span {
            font-size: 28px;
            background-color: pink;
            width: 20px;
            height: 40px;
            /* 行内元素转换为行内块级元素 */
            display: inline-block;
        }
    </style>
</head>

<body>
    <a href="#" target="_blank">行内元素</a><br>
    <div>块级元素</div><br>
    <span>行内元素转换为行内块级元素</span>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复合选择器</title>
</head>
<style>
    /* 后代选择器 */
    ul li {
        color: pink
    }

    ul li a {
        color: red;
    }

    /* 子选择器 */
    .i>a {
        color: pink
    }

    /* 并集选择器 */

    /* div,
    span {
        color: pink;
    } */

    div,
    span,
    .js {
        color: pink;
    }
</style>

<body>
    <h1>复合选择器</h1>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>
            <a href="#">链接</a>
        </li>
    </ul>
    <ol class="i">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <a href="#">链接</a>
        <li>
            <a href="#">链接</a>
        </li>
    </ol>
    <div>html</div>
    <span>CSS</span>
    <p class="js">JavaScript</p>
</body>

</html>

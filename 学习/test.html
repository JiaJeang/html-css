<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .box{
            margin: 100px auto;
            /* border: 1px solid #000; */
            background-color: #000;
            width: 300px;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(3,1fr);
            gap: 20px;
        }
        li{
            list-style: none;
            height: 200px;
            /* width: 100px; */
            background-color: #fff;
        }
        .item5{
            border-radius: 10%;
        }
        .item7{
            border-radius: 0 0 50% 0;
        }
    </style>
</head>
<body>
    <ul class="box">
        <li class="item1"></li>
        <li class="item2"></li>
        <li class="item3"></li>
        <li class="item4"></li>
        <li class="item5"></li>
        <li class="item6"></li>
        <li class="item7"></li>
        <li class="item8"></li>
        <li class="item9"></li>
    </ul>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        width: 200px;
        height: 200px;
        background-color: rgb(92, 92, 92);
        margin: 100px auto;
    }

    .box:hover {
        box-shadow: 10px 10px 10px -4px rgba(0, 0, 0, 0.5);
        /* 水平偏移 垂直偏移 模糊半径 阴影尺寸 颜色 */
        /* x y 必须写 */
        /* h-shadow v-shadow blur spread color inset(内阴影) */
        /* inset 切换为内阴影 写在其他参数之前 */
    }

    .box2 {
        text-align: center;
        font-size: 88px;
        color: #f59d11;
        text-shadow: 5px 5px 5px rgba(0, 0, 0, 0.5);
        /* 水平偏移 垂直偏移 模糊半径 颜色 */
    }
</style>


<body>
    <div class="box"></div>
    <div class="box2">文字阴影</div>

</body>

</html>

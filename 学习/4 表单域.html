<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单域</title>
</head>

<body>
    <center>
        <h1>表单域</h1>
        <!-- form标签定义表单域 -->
        <form action="https://www.luogu.com.cn/" method="get">
            <!-- action属性定义表单提交的地址 并提交表单数据 -->
            <!-- method属性定义表单提交的方法 get/post -->
            <label for="username">用户名:</label><input type="text" name="username" value="请输入用户名" id="username"
                maxlength="8" />
            <input type="text" value="这是一个输入框" style="font-size:20px; width:300px;">
            <!-- 更改输入框的字体大小和宽度 -->
            <br>
            <!-- type属性定义输入字段的类型 text/password/checkbox/radio/submit/reset/button/hidden/file -->
            <!-- label标签定义表单元素的标签 -->
            <!-- name属性定义输入字段的名称  单选和复选框的name值要相同 -->
            <!-- value属性定义输入字段的默认值 -->
            <!-- name和value是每个单元元素的属性值,主要后台人员使用 -->

            <label for="password">密码:</label><input type="password" name="password" id="password" />
            <br>
            <!-- size属性定义输入字段的可见宽度 -->
            <!-- maxlength属性定义输入字段的最大长度 -->
            性别:
            <!-- radio属性定义单选框 -->
            <!-- checked属性定义单选框或复选框是否默认选中 -->
            <input type="radio" name="gender" value="男" checked="checked" id="man" /><label for="man">男</label>
            <input type="radio" name="gender" value="女" id="female" /><label for="female">女</label>
            <br>
            <!--  -->
            爱好:
            吃饭<input type="checkbox" name="hobby" value="吃饭">
            睡觉<input type="checkbox" name="hobby" value="睡觉">
            打游戏<input type="checkbox" name="hobby" value="打游戏">
            <br>
            <!-- checkbox属性定义复选框 -->
            <input type="reset" value="重新填写" />
            <!-- reset属性定义重置按钮 -->
            <input type="submit" value="免费注册" />
            <!-- submit属性定义提交按钮 -->
            <input type="button" value="请输入验证码" />
            <!-- button属性定义按钮 通常与js搭配使用 -->
            <br>
            上传文件:<input type="file" />
            <!-- file属性定义文件上传按钮 -->
            <br>
            请选择城市:
            <select name="city">
                <option value="" selected="selected">请选择城市</option>
                <option value="北京">北京</option>
                <option value="上海">上海</option>
                <option value="广州">广州</option>
                <option value="深圳">深圳</option>
            </select>
            <!-- select属性定义下拉列表 -->
            <!-- selected属性定义下拉列表的默认选中项 -->
            <br>
            <textarea name="remark" cols="30" rows="5">备注:</textarea>
            <!-- textarea标签定义多行文本输入区域 -->
        </form>
    </center>
</body>

</html>

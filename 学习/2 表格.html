<!-- <table>用来定义表格</table>

<table align="center" border="1" cellspacing="0" width="700">
    <!-- align属性定义表格对齐方式 -->
    <!-- border属性定义表格边框 -->
    <!-- cellspacing属性定义单元格间距 -->
    <!-- cellpadding属性定义单元格内边距 -->
    <caption>
        <!-- caption标签定义表格标题 -->
        <b>课程表</b>
    </caption>
    <thead>
        <!-- thead标签定义表格的表头部分 -->
        <tr>
            <th>星期一</th>
            <th>星期二</th>
            <th>星期三</th>
            <th>星期四</th>
            <th>星期五</th>
            <th colspan="4">星期六</th>
            <th colspan="4">星期天</th>
        </tr>
    </thead>
    <!-- 
        rowspan属性定义单元格跨越多行合并 
        colspan属性定义单元格跨越多列合并 
      -->
    <tbody>
        <!-- tbody标签定义表格的主体部分 -->
        <tr>
            <td>数学</td>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    input,
    textarea {
        /* 取消表单轮廓 */
        outline: none;
    }

    textarea {
        /* 防止用户调整文本域大小 */
        resize: none;
    }
</style>

<body>
    <!-- 鼠标样式cursor -->
    <ul>
        <li style="cursor: default;">小白鼠标样式</li>
        <li style="cursor: pointer;">小手样式</li>
        <li style="cursor: move;">移动样式</li>
        <li style="cursor: text;">文本样式</li>
        <li style="cursor: not-allowed;">禁止样式</li>
    </ul>

    <!-- 文本域样式 -->
    <input type="text" placeholder="请输入内容">
    <textarea cols="30" rows="10" placeholder="请输入内容"></textarea>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮动布局</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
    }

    .bigbox {
        height: 628px;
        width: 1240px;
        background-color: pink;
        margin: 100px auto;
    }

    .bigbox .leftbox {
        height: 614px;
        width: 234px;
        background-color: aquamarine;
        float: left;
        margin-top: 7px;
    }

    .rightbox {
        width: 992px;
        height: 615px;
        background-color: turquoise;
        float: left;
        margin: 7px 0 0 14px;
    }

    .rightbox>div {
        width: 234px;
        height: 300px;
        float: left;
        background-color: blueviolet;
        margin-left: 14px;
        margin-bottom: 15px;
        /* margin-top: 14px; */
    }
</style>

<body>
    <div class="bigbox">
        <div class="leftbox"></div>
        <div class="rightbox">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
        </div>
    </div>

</body>

</html>

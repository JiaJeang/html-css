<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>列表</title>
</head>

<body>
    <!-- 无序列表 -->
    <ul>
        <!-- ul里面只能写li
         li里面标签都可以写 -->
        <li>无序列表

        <li>无序列表

        <li>无序列表

    </ul>
    <!-- 有序列表 -->
    <ol>
        <!-- ol里面只能写li
         li里面标签都可以写 -->
        <li>有序列表

        <li>有序列表

        <li>有序列表

    </ol>
    <!-- 自定义列表 -->
    <dl>
        <!-- dl里面只能写dt和dd
         dt定义列表项的名称
         dd定义列表项的描述 -->
        <dt>自定义列表</dt>
        <dd>自定义列表</dd>
        <dd>自定义列表</dd>
    </dl>

</body>

</html>

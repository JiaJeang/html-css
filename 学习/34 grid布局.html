<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        li{
            list-style: none;
        }
        .box{
            margin: 100px auto;
            width: 80%;
            border: 3px solid #000;
        }
        .box li{
            list-style: none;
            background-color: #00AEEC;
            border: 1px solid #fff;
            height: 200px;
        }
        .box{
            display: grid;
            /* 
                grid-template-columns/rows
                    用于来显示布局包含多少列/行 表示一共有多少参数来排列,一份参数占比多少(fr为grid专属分配单位)
                    可以简写为 repeat(重复多少次/auto-fit/auto-fill,数值) auto-fill会保留空轨道
                gap:行间距,列间距
                子元素对齐方式
                    justify_items:
                    align-items:
            */
            /* 
                grid-template-columns: minmax(150px,1fr) 1fr 1fr 1fr; 
                grid-template-rows: repeat(auto-fit,minmax(150px,1fr));
             */
            grid-template-columns: repeat(auto-fit,minmax(100px,1fr));
            gap: 1fr;
        }
        #box{
            border: 1px solid #000;
            margin: 0 auto;
            width: 80%;
            min-width: 800px;
            display: grid;
            /* grid-auto-flow: column; */
            grid-template-columns: repeat(5,minmax(auto,2fr));
            gap: 10px;
        }
        #box li{
            height: 200px;
            background-color: #00AEEC;
            border: 1px solid #fff;
            border-radius: 10px;
        }
        #box .item1{
            /* 跨网格线写在子盒子上 */
            grid-column: 1/3;
            /* grid-row: 1/3; */
            /* 跨几格 */
            grid-row: 1/ span 2;
            /* 跨网格后要更改高度 */
            height: auto;
        }
        #app{
            margin: 100px auto;
            width: 80%;
            border: 1px solid #000;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: 1fr 1fr ;
            /* 改变排列方式 */
            grid-auto-flow: column;
            gap: 10px;
        }
        #app li{
            height: 300px;
            background-color: #00AEEC;
            border: 1px solid #fff;
            border-radius: 10px;
        }
        #app li img{
            display: block;
            width: 100%;
            height: 100%;
            /* 控制替换元素 */
            object-fit: cover;
            /* 控制容器内对齐位置 */
            object-position: center;
        }
        #app li:nth-child(1){
            grid-row: 1/3;
            height: auto;
        }
        #app li:nth-child(3){
           grid-column:2/4;
           grid-row: 2/3;
        }
    </style>
</head>
<body>
    <ul class="box">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
    <ul id="box">
        <li class="item1"></li>
        <li class="item2"></li>
        <li class="item3"></li>
        <li class="item4"></li>
        <li class="item5"></li>
        <li class="item6"></li>
        <li class="item7"></li>
        <li class="item8"></li>
        <li class="item9"></li>
        <li class="item10"></li>
        <li class="item11"></li>
        <li class="item12"></li>
        <li class="item13"></li>
        <li class="item14"></li>
    </ul>
    <ul id="app">
        <li><img src="https://cdn.pixabay.com/photo/2019/10/24/19/22/toco-toucan-4575015__340.jpg" alt=""></li>
        <li><img src="https://cdn.pixabay.com/photo/2022/03/31/00/32/football-7101997__340.jpg" alt=""></li>
        <li><img src="https://cdn.pixabay.com/photo/2019/06/15/15/14/soccer-4275827__340.jpg" alt=""></li>
        <li><img src="https://cdn.pixabay.com/photo/2022/06/08/15/20/artist-7250695__340.jpg" alt=""></li>
    </ul>
</body>
</html>
